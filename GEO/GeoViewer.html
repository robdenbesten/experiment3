<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoViewer – GPS Track Speed Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px 18px;
      background: #ffffff;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      border-bottom: 1px solid #ddd;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #c0392b;
      letter-spacing: 0.03em;
    }

    #file-label {
      cursor: pointer;
      padding: 5px 14px;
      border-radius: 5px;
      background: #fff;
      color: #444;
      font-size: 0.82rem;
      border: 1px solid #c0392b;
      transition: background 0.2s;
      white-space: nowrap;
    }
    #file-label:hover { background: #c0392b; color: #fff; }
    #file-input { display: none; }

    #track-info {
      margin-left: auto;
      font-size: 0.78rem;
      color: #666;
      text-align: right;
      line-height: 1.5;
    }

    #map {
      flex: 1;
      width: 100%;
    }

    /* Speed legend */
    #legend {
      position: absolute;
      bottom: 30px;
      right: 12px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.78rem;
      color: #444;
      min-width: 130px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }

    #legend h4 {
      margin-bottom: 7px;
      font-size: 0.82rem;
      color: #c0392b;
    }

    .legend-gradient {
      height: 14px;
      width: 100%;
      border-radius: 4px;
      background: linear-gradient(to right, #d2d2d2, #cc4444, #cc0000);
      margin-bottom: 4px;
    }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: #888;
    }

    #tooltip-box {
      position: absolute;
      top: 70px;
      left: 12px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.78rem;
      color: #333;
      display: none;
      pointer-events: none;
      max-width: 210px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }

    #error-msg {
      display: none;
      padding: 14px 20px;
      background: #fdecea;
      color: #c0392b;
      font-size: 0.85rem;
      border-bottom: 1px solid #f5c6c6;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>GeoViewer</h1>
  <label id="file-label" for="file-input">&#128194; Load .geojson</label>
  <input type="file" id="file-input" accept=".geojson,.json" />
  <div id="track-info">No file loaded</div>
</header>

<div id="error-msg"></div>
<div id="map"></div>

<div id="legend">
  <h4>Speed (km/h)</h4>
  <div class="legend-gradient"></div>
  <div class="legend-labels"><span>Slow</span><span>Fast</span></div>
</div>

<div id="tooltip-box" id="tooltip-box"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Map init ──────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([52.1065, 5.0937], 16);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> | &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

// ── State ─────────────────────────────────────────────────────────────────────
let trackLayers = [];
const tooltip = document.getElementById('tooltip-box');

// ── Helpers ───────────────────────────────────────────────────────────────────
/** Haversine distance in metres between two [lng, lat] points */
function haversine([lng1, lat1], [lng2, lat2]) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

/** Map a normalised value [0,1] to a light-grey→red colour string */
function speedColor(t) {
  // Light grey (210,210,210) → red (220,50,50)
  const r = Math.round(210 + t * (220 - 210));
  const g = Math.round(210 - t * 160);
  const b = Math.round(210 - t * 160);
  return `rgb(${r},${g},${b})`;
}

/** Line weight – thicker for faster segments */
function speedWeight(t) {
  return 2 + t * 5;
}

// ── Render GeoJSON ────────────────────────────────────────────────────────────
function renderGeoJSON(geojson, filename) {
  // Clear previous layers
  trackLayers.forEach(l => map.removeLayer(l));
  trackLayers = [];
  hideError();

  const features = geojson.features || [];
  let allBounds = [];
  let totalDist = 0;
  let segmentCount = 0;

  features.forEach(feature => {
    const geom = feature.geometry;
    if (!geom) return;

    let lines = [];
    if (geom.type === 'LineString') {
      lines = [geom.coordinates];
    } else if (geom.type === 'MultiLineString') {
      lines = geom.coordinates;
    } else {
      return; // skip non-line features
    }

    lines.forEach((coords, lineIdx) => {
      if (coords.length < 2) return;

      // Per-line coordTimes
      const allTimes = feature.properties && feature.properties.coordTimes;
      const times = (geom.type === 'LineString' && Array.isArray(allTimes))
        ? allTimes : null;

      // ── Deduplicate consecutive identical coordinates ─────────────────────
      // The GPS module updates at ~1 Hz but the app polls much faster, so the
      // same coordinate appears dozens of times in a row with millisecond gaps.
      // Computing speed over those tiny gaps gives nonsense values.
      // Fix: collapse runs of identical coords, keeping the FIRST timestamp of
      // each run. Speed is then distance / time-between-GPS-updates (~1 s).
      const dcCoords = [coords[0]];
      const dcTimes  = [times ? new Date(times[0]).getTime() : null];

      for (let i = 1; i < coords.length; i++) {
        const prev = dcCoords[dcCoords.length - 1];
        if (coords[i][0] !== prev[0] || coords[i][1] !== prev[1]) {
          dcCoords.push(coords[i]);
          dcTimes.push(times && times[i] ? new Date(times[i]).getTime() : null);
        }
      }

      // Accumulate total distance from deduplicated coords
      for (let i = 1; i < dcCoords.length; i++) {
        totalDist += haversine(dcCoords[i - 1], dcCoords[i]);
      }

      // ── Compute speed for each deduplicated segment ───────────────────────
      const speeds = [];
      let hasRealSpeed = false;

      for (let i = 1; i < dcCoords.length; i++) {
        const d = haversine(dcCoords[i - 1], dcCoords[i]);
        const t0 = dcTimes[i - 1], t1 = dcTimes[i];
        if (t0 !== null && t1 !== null) {
          const dtMs = t1 - t0;
          speeds.push(dtMs > 0 ? (d / dtMs) * 3600 : 0); // km/h
          hasRealSpeed = true;
        } else {
          speeds.push(d); // fallback: raw metres
        }
      }

      segmentCount += speeds.length;

      const SPEED_CAP = 10; // km/h — clamp outliers so they don't wash out colour scale
      const cappedSpeeds = hasRealSpeed ? speeds.map(s => Math.min(s, SPEED_CAP)) : speeds;
      const maxSpeed = Math.max(...cappedSpeeds, 0.0001);
      const minSpeed = Math.min(...cappedSpeeds);
      const range    = maxSpeed - minSpeed || 0.0001;

      // ── Draw one polyline per deduplicated segment ────────────────────────
      for (let i = 0; i < speeds.length; i++) {
        const t = (cappedSpeeds[i] - minSpeed) / range;
        const segCoords = [
          [dcCoords[i][1],     dcCoords[i][0]],
          [dcCoords[i + 1][1], dcCoords[i + 1][0]]
        ];
        const displaySpeed = speeds[i];

        const poly = L.polyline(segCoords, {
          color: speedColor(t),
          weight: speedWeight(t),
          opacity: 0.9,
          lineCap: 'round'
        });

        poly.on('mouseover', function(e) {
          tooltip.style.display = 'block';
          const speedLine = hasRealSpeed
            ? `Speed: <b>${displaySpeed.toFixed(1)} km/h</b>`
            : `Displacement: <b>${displaySpeed.toFixed(4)} m</b> <span style="color:#888">(no timestamps)</span>`;
          tooltip.innerHTML =
            `<strong>Segment ${i + 1}</strong><br>` + speedLine;
        });

        poly.on('mousemove', function(e) {
          const mapDiv = document.getElementById('map');
          const rect = mapDiv.getBoundingClientRect();
          const x = e.originalEvent.clientX - rect.left + 12;
          const y = e.originalEvent.clientY - rect.top - 10;
          tooltip.style.left = x + 'px';
          tooltip.style.top  = y + 'px';
        });

        poly.on('mouseout', function() {
          tooltip.style.display = 'none';
        });

        poly.addTo(map);
        if (hasRealSpeed) poly._speedKmh = displaySpeed;
        trackLayers.push(poly);
        allBounds.push(...segCoords);
      }
    });
  });

  if (trackLayers.length === 0) {
    showError('No LineString / MultiLineString features found in this GeoJSON file.');
    return;
  }

  // Fit map to track
  if (allBounds.length > 0) {
    map.fitBounds(L.latLngBounds(allBounds), { padding: [40, 40] });
  }

  // Update info bar
  // Collect all real km/h speeds across all drawn segments for the summary
  const allSpeeds = trackLayers
    .map(l => l._speedKmh)
    .filter(v => v !== undefined && v !== null);
  const maxKmh = allSpeeds.length ? Math.max(...allSpeeds) : null;
  const medianKmh = allSpeeds.length ? [...allSpeeds].sort((a, b) => a - b)[Math.floor(allSpeeds.length / 2)] : null;

  const info = document.getElementById('track-info');
  let speedSummary = '';
  if (maxKmh !== null) {
    speedSummary = `&nbsp;|&nbsp; max <b>${maxKmh.toFixed(1)} km/h</b>&nbsp; median <b>${medianKmh.toFixed(1)} km/h</b>`;
  }
  info.innerHTML =
    `<b>${filename}</b><br>` +
    `${segmentCount} segments &nbsp;|&nbsp; ${(totalDist / 1000).toFixed(3)} km total${speedSummary}`;
}

// ── File picker ───────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    try {
      const geojson = JSON.parse(evt.target.result);
      renderGeoJSON(geojson, file.name);
    } catch (err) {
      showError('Failed to parse GeoJSON: ' + err.message);
    }
  };
  reader.readAsText(file);
});

// ── Auto-load via fetch (works when served over HTTP) ────────────────────────
(async function autoLoad() {
  const candidates = [
    'gps-track-2026-06-01_14-52-53-185.geojson'
  ];

  for (const name of candidates) {
    try {
      const res = await fetch(name);
      if (!res.ok) continue;
      const geojson = await res.json();
      renderGeoJSON(geojson, name);
      return;
    } catch (_) { /* not served over HTTP, fall through */ }
  }
})();

// ── Error helpers ─────────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}
</script>
</body>
</html>
